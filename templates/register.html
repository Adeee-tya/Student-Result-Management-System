<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student - Result Management System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background: #f4f6f9; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #1e293b; color: #fff; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar-brand { padding: 24px; font-size: 20px; font-weight: bold; background: #0f172a; border-bottom: 1px solid #334155; }
        .sidebar-menu { list-style: none; padding: 15px 0; flex-grow: 1; }
        .sidebar-menu li a { display: block; padding: 14px 24px; color: #cbd5e1; text-decoration: none; font-size: 15px; }
        .sidebar-menu li a:hover, .sidebar-menu li.active a { background: #334155; color: #fff; border-left: 4px solid #38bdf8; }
        .sidebar-footer { padding: 20px; background: #0f172a; }
        .logout-btn { color: #ef4444; text-decoration: none; font-weight: 600; font-size: 14px; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .header { margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .header h1 { color: #1e293b; font-size: 28px; }
        
        .form-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row-top { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        
        .submit-btn { background: #10b981; color: white; padding: 12px 24px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="sidebar-brand">Result Portal</div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard">Dashboard</a></li>
                <li class="active"><a href="/register-student">Student Registration</a></li>
                <li><a href="/enter-marks">Manage Marks</a></li>
                <li><a href="/reports">View Reports</a></li>
            </ul>
        </div>
        <div class="sidebar-footer"><a href="/" class="logout-btn">Log Out</a></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>New Student Enrollment</h1>
        </div>

        <div class="form-box">
            <div id="successAlert" style="display: none; background: #d1e7dd; color: #0f5132; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; font-weight: 600; border: 1px solid #badbcc;">
                ✓ Student Profile Saved Successfully to Database!
            </div>

            <form action="/add-student" method="POST">
                <div class="form-row-top">
                    <div class="form-group">
                        <label for="roll_number">Roll Number / Reg ID</label>
                        <input type="text" id="roll_number" name="roll_number" placeholder="ex: CS2026-001" required>
                    </div>
                    <div class="form-group">
                        <label for="admission_year">Admission Year</label>
                        <input type="number" id="admission_year" name="admission_year" value="2026" required>
                    </div>
                    <div class="form-group">
                        <label for="current_semester">Active Semester</label>
                        <select id="current_semester" name="current_semester" required>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter full name details" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Institutional Email Link</label>
                        <input type="email" id="email" name="email" placeholder="username@college.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender Profile</label>
                        <select id="gender" name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Save Student Record</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === '1') {
            document.getElementById('successAlert').style.display = 'block';
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
